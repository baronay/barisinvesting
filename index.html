<!-- ================================================================
     BARIŞ INVESTING — index.html DEĞİŞİKLİKLERİ
     Bu dosyada 3 bölümü değiştirmen gerekiyor.
     Her bölümde "BUNU BUL" ve "BUNUNLA DEĞİŞTİR" kısımları var.
     ================================================================ -->


<!-- ════════════════════════════════════════════════════════════
     DEĞİŞİKLİK 1: ADMIN MODAL HTML
     index.html'de <div class="admin-modal" id="adminModal"> bloğunu
     aşağıdakiyle tamamen değiştir.
     ════════════════════════════════════════════════════════════ -->

<div class="admin-modal" id="adminModal" style="display:none">
  <div class="admin-box">
    <div class="admin-hdr">
      <div class="admin-title">⚙ Admin Paneli — Barış Investing</div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">

      <!-- İstatistik kartları (8'e çıkarıldı) -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:20px" id="adminStats">
        <div class="admin-stat"><div class="admin-stat-n" id="aStatUsers">—</div><div class="admin-stat-l">Toplam Kullanıcı</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatAnalyze">—</div><div class="admin-stat-l">Toplam Analiz</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatToday">—</div><div class="admin-stat-l">Bugün Kayıt</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatWeek">—</div><div class="admin-stat-l">Bu Hafta Kayıt</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatActive">—</div><div class="admin-stat-l">Bugün Aktif</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatCredits">—</div><div class="admin-stat-l">Kalan Haklar</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatReferrals">—</div><div class="admin-stat-l">Toplam Davet</div></div>
        <div class="admin-stat"><div class="admin-stat-n" id="aStatConsent">—</div><div class="admin-stat-l">Mail İzni</div></div>
      </div>

      <!-- Arama + Yenile -->
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <input id="adminSearch" type="text" placeholder="E-posta ara..."
          style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 10px;outline:none"
          oninput="filterAdminTable(this.value)"/>
        <button class="admin-refresh" onclick="loadAdminUsers()" style="margin-bottom:0">↻ Yenile</button>
        <button id="adminExportEmailsBtn" style="display:none;background:var(--success);color:#fff;border:none;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:7px 12px;cursor:pointer">
          ↓ E-postaları İndir
        </button>
      </div>

      <!-- Kullanıcı tablosu -->
      <div style="overflow-x:auto;max-height:420px;overflow-y:auto">
        <table class="admin-user-table" id="adminUserTable">
          <thead style="position:sticky;top:0;z-index:1">
            <tr>
              <th>E-posta</th>
              <th>Kayıt</th>
              <th>Son Giriş</th>
              <th style="text-align:center">Analiz</th>
              <th style="text-align:center">Hak</th>
              <th style="text-align:center">Davet</th>
              <th>Hak Ekle</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="adminUserBody"></tbody>
        </table>
      </div>

      <div style="margin-top:10px;font-size:10px;color:var(--muted2);font-family:'IBM Plex Mono',monospace" id="adminNote"></div>
    </div>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     DEĞİŞİKLİK 2: REFERANS BÖLÜMÜ — sidebar'a ekle
     index.html'de sidebar içinde "Çıkış" butonunun hemen ÜSTÜNE
     şu bloğu ekle:
     ════════════════════════════════════════════════════════════ -->

<div id="refSection" style="display:none;padding:10px 16px;border-top:1px solid var(--border-s)">
  <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8892b0;font-family:'IBM Plex Mono',monospace;margin-bottom:6px">Arkadaşını Davet Et</div>
  <div style="display:flex;gap:4px;margin-bottom:6px">
    <div id="refCodeDisplay" style="flex:1;background:#111827;border:1px solid var(--border-s);color:#a8b8d8;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 8px;letter-spacing:1px">—</div>
    <button onclick="copyRefLink()" style="background:rgba(168,184,216,0.1);border:1px solid var(--border-s);color:#8892b0;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:6px 8px;cursor:pointer;white-space:nowrap" title="Kopyala">⎘ Kopyala</button>
  </div>
  <div style="font-size:9px;color:#8892b0;line-height:1.6">
    Davet ettiğin kişi <span style="color:#a8b8d8">+1 hak</span> kazanır,<br>sen <span style="color:#a8b8d8">+2 hak</span> kazanırsın.
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     DEĞİŞİKLİK 3: JAVASCRIPT — </script> kapanış etiketinin
     hemen ÖNÜNE şu JS bloğunu ekle:
     ════════════════════════════════════════════════════════════ -->

<script>
// ── REFERANS SİSTEMİ ──

function showRefSection() {
  const sec = document.getElementById('refSection');
  const display = document.getElementById('refCodeDisplay');
  if (!curUser?.ref_code || !sec) return;
  sec.style.display = 'block';
  if (display) display.textContent = curUser.ref_code;
}

function copyRefLink() {
  const code = curUser?.ref_code;
  if (!code) return;
  const link = `${location.origin}?ref=${code}`;
  navigator.clipboard.writeText(link).then(() => {
    showToast('✓ Davet linki kopyalandı!', 'success');
  }).catch(() => {
    // Clipboard API yoksa prompt ile göster
    prompt('Davet linkini kopyala:', link);
  });
}

// Sayfa açılırken URL'de ref kodu varsa localStorage'a kaydet
(function() {
  const params = new URLSearchParams(location.search);
  const ref = params.get('ref');
  if (ref) localStorage.setItem('bi_ref', ref);
})();

// doAuth fonksiyonunu ref kodu destekli yap
// (Mevcut doAuth fonksiyonunu bul ve body kısmına refCode ekle)
// Not: Eğer doAuth'u değiştirmek istemiyorsan sadece bu override'ı ekle:
const _origDoAuth = window.doAuth;
window.doAuth = async function() {
  // ref kodu URL'den veya localStorage'dan al
  const refCode = localStorage.getItem('bi_ref') || null;

  const emailIn = document.getElementById('authEmailIn');
  const errEl = document.getElementById('authErr');
  const marketingEl = document.getElementById('marketingConsent');
  const email = (emailIn?.value || '').trim();
  if (!email || !email.includes('@')) {
    if (errEl) { errEl.textContent = 'Geçerli bir e-posta girin.'; errEl.style.display = 'block'; }
    return;
  }
  const btn = document.querySelector('.auth-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Kaydediliyor...'; }
  if (errEl) errEl.style.display = 'none';

  const fallbackUser = { email, credits: 3, is_admin: false, total_used: 0, offline: true };

  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, marketingConsent: marketingEl?.checked ?? false, refCode })
    });
    const data = await r.json();

    if (data.user) {
      curUser = data.user;
      // Kullanılan ref kodunu temizle
      localStorage.removeItem('bi_ref');

      // Bildirimler
      if (data.refBonus) showToast('🎁 Davet bonusu! +1 ekstra analiz hakkı kazandın.', 'success');
      if (data.dailyBonus) showToast('☀ Günlük bonus! +1 analiz hakkı eklendi.', 'success');
    } else {
      curUser = fallbackUser;
    }
  } catch {
    curUser = fallbackUser;
  }

  localStorage.setItem('bi_email', email);
  hideAuthModal();
  updateSidebarUserUI();
  updateCreditsUI();
  loadPortfolioFromCloud();
  showRefSection(); // referans bölümünü göster

  if (curUser.offline) {
    showToast('✓ Mail kaydedildi. Çevrimdışı mod — 3 hakkın var.', 'warn');
  } else if (curUser.credits === 3 && curUser.total_used === 0) {
    showToast('✓ Hoş geldin! 3 ücretsiz analiz hakkın hazır.', 'success');
  } else {
    showToast(`✓ Tekrar hoş geldin! ${curUser.credits} hakkın var.`, 'success');
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Giriş Yap'; }
};

// ── GELİŞMİŞ ADMIN PANELİ ──

let _adminSecret = null;
let _adminAllUsers = [];

async function loadAdminUsers() {
  const email = getEmail();
  const secret = _adminSecret || prompt('Admin şifresi:');
  if (!secret) return;
  _adminSecret = secret; // şifreyi session'da sakla

  const body = document.getElementById('adminUserBody');
  const note = document.getElementById('adminNote');
  if (body) body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:16px;color:var(--muted2)">Yükleniyor...</td></tr>';

  try {
    const r = await fetch('/api/auth?action=admin_users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, secret })
    });
    const data = await r.json();

    if (data.error) {
      _adminSecret = null; // yanlış şifre — sıfırla
      if (note) note.textContent = '⚠ ' + data.error;
      if (body) body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:16px;color:var(--danger)">Yetkisiz erişim</td></tr>';
      return;
    }

    // İstatistikleri güncelle
    const s = data.stats;
    const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
    set('aStatUsers', s.total);
    set('aStatAnalyze', s.totalAnalyze);
    set('aStatToday', s.todayNew);
    set('aStatWeek', s.weekNew || '—');
    set('aStatActive', s.activeToday || '—');
    set('aStatCredits', s.totalCredits);
    set('aStatReferrals', s.totalReferrals || 0);
    set('aStatConsent', s.marketingConsent);

    if (note) note.textContent = `Toplam ${s.total} kullanıcı · ${s.marketingConsent} mail izni`;

    // E-posta export butonu
    const exportBtn = document.getElementById('adminExportEmailsBtn');
    if (exportBtn) {
      const consentEmails = (data.users || []).filter(u => u.marketing_consent).map(u => u.email);
      exportBtn.style.display = consentEmails.length > 0 ? 'block' : 'none';
      exportBtn.textContent = `↓ ${consentEmails.length} mail indir`;
      exportBtn.onclick = () => {
        const blob = new Blob([consentEmails.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'barisinvesting_emails.txt';
        a.click();
      };
    }

    // Kullanıcıları kaydet ve tabloyu çiz
    _adminAllUsers = data.users || [];
    renderAdminTable(_adminAllUsers, secret);

  } catch (e) {
    if (note) note.textContent = '⚠ Hata: ' + e.message;
  }
}

function renderAdminTable(users, secret) {
  const body = document.getElementById('adminUserBody');
  if (!body) return;
  body.innerHTML = '';

  users.forEach(u => {
    const tr = document.createElement('tr');
    const joined = u.joined_at ? new Date(u.joined_at).toLocaleDateString('tr-TR') : '—';
    const seen = u.last_seen ? new Date(u.last_seen).toLocaleDateString('tr-TR') : '—';

    // Son görülme rengi
    const seenDate = u.last_seen ? new Date(u.last_seen) : null;
    const isActiveToday = seenDate && (Date.now() - seenDate.getTime() < 86400000);
    const seenColor = isActiveToday ? 'color:var(--success)' : '';

    tr.innerHTML = `
      <td>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px">${u.email}</span>
        ${u.is_admin ? '<span style="font-size:8px;padding:1px 4px;background:rgba(184,112,10,0.15);color:var(--warn);border:1px solid rgba(184,112,10,0.3);margin-left:4px">admin</span>' : ''}
        ${u.marketing_consent ? '<span style="font-size:8px;color:var(--success);margin-left:3px" title="Mail izni var">✉</span>' : ''}
        ${u.referred_by ? '<span style="font-size:8px;color:var(--muted2);margin-left:3px" title="Davet ile katıldı">⤷</span>' : ''}
      </td>
      <td style="font-size:10px;color:var(--muted2)">${joined}</td>
      <td style="font-size:10px;${seenColor}">${seen}</td>
      <td style="text-align:center;font-family:'Playfair Display',serif;font-size:13px">${u.total_used || 0}</td>
      <td style="text-align:center;font-family:'Playfair Display',serif;font-size:13px;color:${(u.credits||0) <= 1 && !u.is_admin ? 'var(--danger)' : 'var(--accent2)'}">
        ${u.is_admin ? '∞' : u.credits}
      </td>
      <td style="text-align:center;font-size:10px;color:var(--muted2)">${u.ref_count || 0}</td>
      <td>
        <div style="display:flex;gap:4px;align-items:center">
          <input type="number" id="cr_${u.email.replace(/[@.]/g,'_')}"
            style="width:44px;background:var(--bg2);border:1px solid var(--border);padding:3px 5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text);text-align:center"
            value="3" min="1" max="100"/>
          <button onclick="addCredits('${u.email}','${secret}')"
            style="background:var(--accent2);color:#fff;border:none;padding:3px 8px;cursor:pointer;font-size:9px;font-family:'IBM Plex Mono',monospace">+Ekle</button>
        </div>
      </td>
      <td>
        <button onclick="deleteUser('${u.email}','${secret}')"
          style="background:none;border:1px solid var(--danger);color:var(--danger);padding:3px 7px;cursor:pointer;font-size:9px;font-family:'IBM Plex Mono',monospace">Sil</button>
      </td>
    `;
    body.appendChild(tr);
  });
}

function filterAdminTable(query) {
  const q = query.toLowerCase().trim();
  const filtered = q ? _adminAllUsers.filter(u => u.email.toLowerCase().includes(q)) : _adminAllUsers;
  renderAdminTable(filtered, _adminSecret);
}

async function addCredits(targetEmail, secret) {
  const safeId = targetEmail.replace(/[@.]/g, '_');
  const inp = document.getElementById('cr_' + safeId);
  const credits = parseInt(inp?.value || 3);
  const email = getEmail();
  try {
    const r = await fetch('/api/auth?action=admin_credits', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, secret, targetEmail, credits })
    });
    const d = await r.json();
    if (d.ok) showToast(`✓ ${targetEmail} → ${d.credits} hak`, 'success');
    else showToast('⚠ ' + d.error, 'error');
  } catch (e) { showToast('Hata: ' + e.message, 'error'); }
}

async function deleteUser(targetEmail, secret) {
  if (!confirm(`${targetEmail} silinsin mi? Bu işlem geri alınamaz.`)) return;
  const email = getEmail();
  try {
    const r = await fetch('/api/auth?action=admin_delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, secret, targetEmail })
    });
    const d = await r.json();
    if (d.ok) {
      showToast('✓ Kullanıcı silindi', 'success');
      _adminAllUsers = _adminAllUsers.filter(u => u.email !== targetEmail);
      renderAdminTable(_adminAllUsers, secret);
    } else showToast('⚠ ' + d.error, 'error');
  } catch (e) { showToast('Hata: ' + e.message, 'error'); }
}

// Sayfa init'e ekle — ref section'ı göster
document.addEventListener('DOMContentLoaded', () => {
  if (curUser?.ref_code) showRefSection();
});
</script>
